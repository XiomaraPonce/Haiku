<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris Message Board</title>
  <style>
    :root {
      --cols: 18;
      --rows: 22;
      --cell: 28px;
      --board-w: calc(var(--cols) * var(--cell));
      --board-h: calc(var(--rows) * var(--cell));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #20304f 0%, #111827 55%, #090d14 100%);
      font-family: Arial, sans-serif;
    }

    #board {
      position: relative;
      width: var(--board-w);
      height: var(--board-h);
      border: 2px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      background-size: var(--cell) var(--cell), var(--cell) var(--cell), auto;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.35),
        inset 0 0 28px rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .cell {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      border: 1px solid rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.14);
      user-select: none;
      line-height: 1;
      overflow: hidden;
      white-space: nowrap;
    }

    .flash {
      filter: brightness(1.8);
    }
  </style>
</head>
<body>
  <div id="board"></div>

  <script>
    const COLS = 18;
    const ROWS = 22;
    const CELL = 28;
    const boardEl = document.getElementById("board");

    const COLORS = {
      I: "#27C9FF",
      O: "#FFD23F",
      T: "#B57BFF",
      S: "#56E39F",
      Z: "#FF6B6B",
      J: "#5DA9FF",
      L: "#FF9F43"
    };

    const BAG_TYPES = ["I","O","T","S","Z","J","L"];
    const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    const PIECES = {
      I: [
        [[0,1],[1,1],[2,1],[3,1]],
        [[2,0],[2,1],[2,2],[2,3]],
        [[0,2],[1,2],[2,2],[3,2]],
        [[1,0],[1,1],[1,2],[1,3]]
      ],
      O: [
        [[1,0],[2,0],[1,1],[2,1]],
        [[1,0],[2,0],[1,1],[2,1]],
        [[1,0],[2,0],[1,1],[2,1]],
        [[1,0],[2,0],[1,1],[2,1]]
      ],
      T: [
        [[1,0],[0,1],[1,1],[2,1]],
        [[1,0],[1,1],[2,1],[1,2]],
        [[0,1],[1,1],[2,1],[1,2]],
        [[1,0],[0,1],[1,1],[1,2]]
      ],
      S: [
        [[1,0],[2,0],[0,1],[1,1]],
        [[1,0],[1,1],[2,1],[2,2]],
        [[1,1],[2,1],[0,2],[1,2]],
        [[0,0],[0,1],[1,1],[1,2]]
      ],
      Z: [
        [[0,0],[1,0],[1,1],[2,1]],
        [[2,0],[1,1],[2,1],[1,2]],
        [[0,1],[1,1],[1,2],[2,2]],
        [[1,0],[0,1],[1,1],[0,2]]
      ],
      J: [
        [[0,0],[0,1],[1,1],[2,1]],
        [[1,0],[2,0],[1,1],[1,2]],
        [[0,1],[1,1],[2,1],[2,2]],
        [[1,0],[1,1],[0,2],[1,2]]
      ],
      L: [
        [[2,0],[0,1],[1,1],[2,1]],
        [[1,0],[1,1],[1,2],[2,2]],
        [[0,1],[1,1],[2,1],[0,2]],
        [[0,0],[1,0],[1,1],[1,2]]
      ]
    };

    const FINAL_MESSAGE = [
      ["S","O","M","E","T","I","M","E","S","","I","","W","O","N","D","E","R"],
      ["","IF","","I'M","","LI","VI","NG","","CO","RR","EC","TL","Y","","","",""],
      ["","S","U","R","E","L","Y","","O","T","H","E","R","S","","T","O","O"]
    ];

    function emptyBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function cloneBoard(board) {
      return board.map(row => row.map(cell => cell ? { ...cell } : null));
    }

    function randInt(n) {
      return Math.floor(Math.random() * n);
    }

    function randomLetter() {
      return LETTERS[randInt(LETTERS.length)];
    }

    function randomLetters(n = 4) {
      return Array.from({ length: n }, () => randomLetter());
    }

    function cellsFor(type, rot, x, y, labels) {
      return PIECES[type][rot].map(([dx, dy], i) => ({
        x: x + dx,
        y: y + dy,
        label: labels[i] ?? "",
        color: COLORS[type]
      }));
    }

    function fits(board, type, rot, x, y) {
      const cells = PIECES[type][rot];
      for (const [dx, dy] of cells) {
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
      return true;
    }

    function hardDropY(board, type, rot, x) {
      let y = -4;
      while (fits(board, type, rot, x, y + 1)) y++;
      return y;
    }

    function placePiece(board, type, rot, x, y, labels) {
      const next = cloneBoard(board);
      const placedCells = cellsFor(type, rot, x, y, labels);

      for (const cell of placedCells) {
        if (cell.y >= 0) {
          next[cell.y][cell.x] = {
            label: cell.label,
            color: cell.color
          };
        }
      }

      return next;
    }

    function findFullRows(board) {
      const rows = [];
      for (let y = 0; y < ROWS; y++) {
        if (board[y].every(cell => cell !== null)) rows.push(y);
      }
      return rows;
    }

    function clearRows(board, rowsToClear) {
      const next = cloneBoard(board);
      const set = new Set(rowsToClear);
      const kept = [];

      for (let y = 0; y < ROWS; y++) {
        if (!set.has(y)) kept.push(next[y]);
      }

      while (kept.length < ROWS) {
        kept.unshift(Array(COLS).fill(null));
      }

      return kept;
    }

    function columnHeights(board) {
      const heights = Array(COLS).fill(0);
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          if (board[y][x]) {
            heights[x] = ROWS - y;
            break;
          }
        }
      }
      return heights;
    }

    function countHoles(board) {
      let holes = 0;
      for (let x = 0; x < COLS; x++) {
        let seenBlock = false;
        for (let y = 0; y < ROWS; y++) {
          if (board[y][x]) seenBlock = true;
          else if (seenBlock) holes++;
        }
      }
      return holes;
    }

    function stackHeight(board) {
      for (let y = 0; y < ROWS; y++) {
        if (board[y].some(Boolean)) return ROWS - y;
      }
      return 0;
    }

    function bestPlacement(board, type) {
      let best = null;

      for (let rot = 0; rot < 4; rot++) {
        let minX = Infinity;
        let maxX = -Infinity;
        for (const [dx] of PIECES[type][rot]) {
          minX = Math.min(minX, dx);
          maxX = Math.max(maxX, dx);
        }

        for (let x = -minX; x <= COLS - 1 - maxX; x++) {
          if (!fits(board, type, rot, x, -4)) continue;

          const y = hardDropY(board, type, rot, x);
          const letters = ["A","B","C","D"];
          const afterPlace = placePiece(board, type, rot, x, y, letters);
          const fullRows = findFullRows(afterPlace);
          const afterClear = clearRows(afterPlace, fullRows);

          const heights = columnHeights(afterClear);
          const aggregateHeight = heights.reduce((a, b) => a + b, 0);
          const bumpiness = heights.slice(1).reduce((sum, h, i) => sum + Math.abs(h - heights[i]), 0);
          const holes = countHoles(afterClear);
          const cleared = fullRows.length;

          const score =
            cleared * 10000
            - aggregateHeight * 5
            - holes * 40
            - bumpiness * 6
            + Math.random() * 10;

          if (!best || score > best.score) {
            best = { type, rot, x, y, score };
          }
        }
      }

      return best;
    }

    function makeBag() {
      const bag = [...BAG_TYPES];
      for (let i = bag.length - 1; i > 0; i--) {
        const j = randInt(i + 1);
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
      return bag;
    }

    function simulatePrelude() {
      for (let attempt = 0; attempt < 25; attempt++) {
        let board = emptyBoard();
        let bag = [];
        const actions = [];
        let sawFourRows = false;

        for (let step = 0; step < 80; step++) {
          if (bag.length === 0) bag = makeBag();

          const type = bag.pop();
          const best = bestPlacement(board, type);
          if (!best) break;

          const labels = randomLetters(4);
          const beforeClear = placePiece(board, type, best.rot, best.x, best.y, labels);
          const clearedRows = findFullRows(beforeClear);

          if (stackHeight(beforeClear) >= 4) {
            sawFourRows = true;
          }

          const afterClear = clearRows(beforeClear, clearedRows);

          actions.push({
            type,
            rot: best.rot,
            x: best.x,
            y: best.y,
            labels,
            boardAfterLock: beforeClear,
            clearedRows,
            boardAfterClear: afterClear
          });

          board = afterClear;

          if (sawFourRows && clearedRows.length === 1) {
            return actions;
          }
        }
      }

      return null;
    }

    function makeMessageBoard() {
      const board = emptyBoard();
      const startRow = ROWS - 3;
      let colorIndex = 0;
      const palette = ["#27C9FF", "#B57BFF", "#56E39F", "#FFD23F", "#FF6B6B", "#5DA9FF", "#FF9F43"];

      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < COLS; c++) {
          const text = FINAL_MESSAGE[r][c];
          if (!text) continue;
          board[startRow + r][c] = {
            label: text.toUpperCase(),
            color: palette[colorIndex % palette.length]
          };
          colorIndex++;
        }
      }

      return board;
    }

    let worldBoard = emptyBoard();
    const preludeActions = simulatePrelude();
    let currentActionIndex = 0;
    let livePiece = null;
    let flashRows = [];
    let flashTimer = 0;
    let phase = preludeActions ? "DROP" : "MESSAGE_WAIT";
    let pauseTimer = 0;
    const messageBoard = makeMessageBoard();

    function spawnNextActionPiece() {
      if (!preludeActions || currentActionIndex >= preludeActions.length) {
        phase = "MESSAGE_WAIT";
        pauseTimer = 24;
        livePiece = null;
        return;
      }

      const action = preludeActions[currentActionIndex];
      livePiece = {
        ...action,
        drawY: -4
      };
    }

    function update() {
      if (phase === "DROP") {
        if (!livePiece) {
          spawnNextActionPiece();
          return;
        }

        if (livePiece.drawY < livePiece.y) {
          livePiece.drawY += 1;
        } else {
          worldBoard = cloneBoard(livePiece.boardAfterLock);

          if (livePiece.clearedRows.length) {
            flashRows = [...livePiece.clearedRows];
            flashTimer = 10;
            phase = "FLASH";
          } else {
            currentActionIndex++;
            livePiece = null;
          }
        }
      } else if (phase === "FLASH") {
        flashTimer--;
        if (flashTimer <= 0) {
          worldBoard = cloneBoard(preludeActions[currentActionIndex].boardAfterClear);
          currentActionIndex++;
          livePiece = null;

          if (currentActionIndex >= preludeActions.length) {
            phase = "MESSAGE_WAIT";
            pauseTimer = 24;
          } else {
            phase = "DROP";
          }
        }
      } else if (phase === "MESSAGE_WAIT") {
        pauseTimer--;
        if (pauseTimer <= 0) {
          worldBoard = emptyBoard();
          phase = "MESSAGE_REVEAL";
          pauseTimer = 0;
        }
      } else if (phase === "MESSAGE_REVEAL") {
        worldBoard = cloneBoard(messageBoard);
        phase = "DONE";
      }
    }

    function render() {
      boardEl.innerHTML = "";

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const cell = worldBoard[y][x];
          if (!cell) continue;

          const el = document.createElement("div");
          el.className = "cell";
          if (flashRows.includes(y) && phase === "FLASH") {
            el.classList.add("flash");
          }
          el.style.left = `${x * CELL}px`;
          el.style.top = `${y * CELL}px`;
          el.style.background = cell.color;

          const len = cell.label.length;
          el.style.fontSize = len >= 3 ? "9px" : len === 2 ? "11px" : "14px";
          el.textContent = cell.label.toUpperCase();

          boardEl.appendChild(el);
        }
      }

      if (livePiece && phase === "DROP") {
        const cells = cellsFor(
          livePiece.type,
          livePiece.rot,
          livePiece.x,
          livePiece.drawY,
          livePiece.labels.map(s => s.toUpperCase())
        );

        for (const cell of cells) {
          if (cell.y < 0) continue;

          const el = document.createElement("div");
          el.className = "cell";
          el.style.left = `${cell.x * CELL}px`;
          el.style.top = `${cell.y * CELL}px`;
          el.style.background = cell.color;
          el.style.fontSize = "14px";
          el.textContent = cell.label.toUpperCase();
          boardEl.appendChild(el);
        }
      }
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(() => setTimeout(loop, 70));
    }

    render();
    loop();
  </script>
</body>
</html>
