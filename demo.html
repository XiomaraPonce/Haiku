<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haiku Tetris Text</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #1b1b2f, #162447);
      overflow: hidden;
    }

    .piece {
      position: absolute;
      width: 120px;
      height: 120px;
      animation: fall linear forwards;
    }

    .block {
      position: absolute;
      width: 30px;
      height: 30px;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    @keyframes fall {
      from {
        transform: translateY(-150px) rotate(0deg);
      }
      to {
        transform: translateY(calc(100vh - 140px)) rotate(6deg);
      }
    }
  </style>
</head>
<body>
  <div id="scene"></div>

  <script>
    const scene = document.getElementById("scene");

    const haikuLines = [
      "Divs drift through night",
      "Tetris pieces softly fall",
      "Code becomes a poem"
    ];

    let lineIndex = 0;
    let charIndex = 0;

    function nextChar() {
      const line = haikuLines[lineIndex];
      const char = line[charIndex];

      charIndex++;
      if (charIndex >= line.length) {
        charIndex = 0;
        lineIndex = (lineIndex + 1) % haikuLines.length;
      }

      return char === " " ? "·" : char;
    }

    const shapes = [
      {
        color: "#00f5ff",
        cells: [[0,1],[1,1],[2,1],[3,1]] // I
      },
      {
        color: "#ffe600",
        cells: [[1,0],[2,0],[1,1],[2,1]] // O
      },
      {
        color: "#b84dff",
        cells: [[1,0],[0,1],[1,1],[2,1]] // T
      },
      {
        color: "#4dff88",
        cells: [[1,0],[2,0],[0,1],[1,1]] // S
      },
      {
        color: "#ff5c5c",
        cells: [[0,0],[1,0],[1,1],[2,1]] // Z
      },
      {
        color: "#4da6ff",
        cells: [[0,0],[0,1],[1,1],[2,1]] // J
      },
      {
        color: "#ff9f43",
        cells: [[2,0],[0,1],[1,1],[2,1]] // L
      }
    ];

    function createPiece() {
      const pieceData = shapes[Math.floor(Math.random() * shapes.length)];
      const piece = document.createElement("div");
      piece.className = "piece";

      const startX = Math.random() * (window.innerWidth - 140);
      const duration = 4 + Math.random() * 3;

      piece.style.left = `${startX}px`;
      piece.style.top = `-140px`;
      piece.style.animationDuration = `${duration}s`;

      pieceData.cells.forEach(([x, y]) => {
        const block = document.createElement("div");
        block.className = "block";
        block.style.left = `${x * 30}px`;
        block.style.top = `${y * 30}px`;
        block.style.background = pieceData.color;
        block.textContent = nextChar();
        piece.appendChild(block);
      });

      scene.appendChild(piece);

      piece.addEventListener("animationend", () => {
        piece.remove();
      });
    }

    setInterval(createPiece, 700);
  </script>
</body>
</html>
