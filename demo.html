<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haiku Tetris Assembly</title>
  <style>
    :root {
      --cell: 28px;
      --cols: 26;
      --rows: 18;
      --board-w: calc(var(--cols) * var(--cell));
      --board-h: calc(var(--rows) * var(--cell));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #26345e 0%, #161b33 45%, #0d1020 100%);
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    #wrap {
      position: relative;
      width: var(--board-w);
    }

    #title {
      text-align: center;
      margin-bottom: 14px;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    #board {
      position: relative;
      width: var(--board-w);
      height: var(--board-h);
      border: 2px solid rgba(255,255,255,0.18);
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      background-size: var(--cell) var(--cell), var(--cell) var(--cell), auto;
      box-shadow:
        0 18px 50px rgba(0,0,0,0.35),
        inset 0 0 30px rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .piece {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--board-w);
      height: var(--board-h);
      pointer-events: none;
    }

    .block {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      border: 1px solid rgba(0,0,0,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.12);
      user-select: none;
    }

    .locked {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0,0,0,0.28);
      font-weight: 700;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.12);
      animation: settle 180ms ease-out;
    }

    .ghost-text {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--board-w);
      height: var(--board-h);
      pointer-events: none;
    }

    .ghost-cell {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.09);
      font-weight: 700;
      font-size: 14px;
    }

    @keyframes settle {
      from { transform: scale(1.15); }
      to { transform: scale(1); }
    }

    #caption {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="title">Haiku assembling from falling tetrominoes</div>
    <div id="board">
      <div id="ghost" class="ghost-text"></div>
    </div>
    <div id="caption">The letters are the blocks.</div>
  </div>

  <script>
    const board = document.getElementById("board");
    const ghost = document.getElementById("ghost");

    const CELL = 28;
    const COLS = 26;
    const ROWS = 18;

    const colors = [
      "#00d1ff", "#ffcf33", "#c86bff", "#54e38e",
      "#ff6b6b", "#5aa9ff", "#ff9b42"
    ];

    const haikuLines = [
      "Divs drift through night",
      "Tetris pieces softly fall",
      "Code becomes a poem"
    ];

    const poemTopRow = ROWS - 4; // leaves one empty row below as floor space feel
    const paddedLines = haikuLines.map(line => {
      const leftPad = Math.floor((COLS - line.length) / 2);
      const rightPad = COLS - line.length - leftPad;
      return " ".repeat(leftPad) + line + " ".repeat(rightPad);
    });

    // Show faint target text
    paddedLines.forEach((line, rowIndex) => {
      [...line].forEach((ch, col) => {
        if (ch === " ") return;
        const cell = document.createElement("div");
        cell.className = "ghost-cell";
        cell.style.left = `${col * CELL}px`;
        cell.style.top = `${(poemTopRow + rowIndex) * CELL}px`;
        cell.textContent = ch;
        ghost.appendChild(cell);
      });
    });

    // Collect target cells for the poem, left-to-right, top-to-bottom.
    const targets = [];
    paddedLines.forEach((line, rowIndex) => {
      [...line].forEach((ch, colIndex) => {
        if (ch === " ") return;
        targets.push({
          row: poemTopRow + rowIndex,
          col: colIndex,
          char: ch
        });
      });
    });

    function colorForIndex(i) {
      return colors[i % colors.length];
    }

    function createAnimatedPiece(group, groupIndex) {
      const piece = document.createElement("div");
      piece.className = "piece";

      const spawnCol = Math.floor(Math.random() * (COLS - 4));
      const spawnY = -4;

      group.forEach((cellData, i) => {
        const block = document.createElement("div");
        block.className = "block";
        block.textContent = cellData.char;
        block.style.background = colorForIndex(groupIndex);
        block.style.left = `${spawnCol * CELL}px`;
        block.style.top = `${(spawnY + i) * CELL}px`;

        piece.appendChild(block);

        // Animate each letter-block to its final board cell.
        const dx = (cellData.col - spawnCol) * CELL;
        const dy = (cellData.row - (spawnY + i)) * CELL;
        block.animate(
          [
            { transform: "translate(0px, 0px) rotate(0deg)" },
            { transform: `translate(${dx}px, ${dy}px) rotate(0deg)` }
          ],
          {
            duration: 1200 + Math.random() * 300,
            easing: "cubic-bezier(.2,.8,.2,1)",
            fill: "forwards"
          }
        );
      });

      board.appendChild(piece);

      setTimeout(() => {
        group.forEach((cellData) => {
          const locked = document.createElement("div");
          locked.className = "locked";
          locked.textContent = cellData.char;
          locked.style.left = `${cellData.col * CELL}px`;
          locked.style.top = `${cellData.row * CELL}px`;
          locked.style.background = colorForIndex(groupIndex);
          board.appendChild(locked);
        });

        piece.remove();
      }, 1450);
    }

    // Split the poem into groups of 4 letters so each drop feels like a tetromino.
    const groups = [];
    for (let i = 0; i < targets.length; i += 4) {
      groups.push(targets.slice(i, i + 4));
    }

    let current = 0;
    function dropNextGroup() {
      if (current >= groups.length) return;
      createAnimatedPiece(groups[current], current);
      current++;
      setTimeout(dropNextGroup, 320);
    }

    dropNextGroup();
  </script>
</body>
</html>
