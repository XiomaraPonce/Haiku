<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haiku Tetris</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #1b1b2f, #162447);
      overflow: hidden;
    }

    .line {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      letter-spacing: 2px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      backdrop-filter: blur(4px);
      z-index: 2;
    }

    #line1 { top: 18%; }
    #line2 { top: 35%; }
    #line3 { top: 52%; }

    .piece {
      position: absolute;
      width: 96px;
      height: 96px;
      z-index: 1;
      animation: fall linear forwards;
    }

    .block {
      position: absolute;
      width: 24px;
      height: 24px;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.25);
    }

    @keyframes fall {
      from {
        transform: translateY(-140px) rotate(0deg);
      }
      to {
        transform: translateY(calc(100vh - 140px)) rotate(8deg);
      }
    }
  </style>
</head>
<body>
  <div id="scene">
    <div id="line1" class="line">Divs drift through night</div>
    <div id="line2" class="line">Tetris pieces softly fall</div>
    <div id="line3" class="line">Code becomes a poem</div>
  </div>

  <script>
    const scene = document.getElementById("scene");

    const shapes = [
      {
        color: "#00f5ff",
        cells: [[0,1],[1,1],[2,1],[3,1]] // I
      },
      {
        color: "#ffe600",
        cells: [[1,0],[2,0],[1,1],[2,1]] // O
      },
      {
        color: "#b84dff",
        cells: [[1,0],[0,1],[1,1],[2,1]] // T
      },
      {
        color: "#4dff88",
        cells: [[1,0],[2,0],[0,1],[1,1]] // S
      },
      {
        color: "#ff5c5c",
        cells: [[0,0],[1,0],[1,1],[2,1]] // Z
      },
      {
        color: "#4da6ff",
        cells: [[0,0],[0,1],[1,1],[2,1]] // J
      },
      {
        color: "#ff9f43",
        cells: [[2,0],[0,1],[1,1],[2,1]] // L
      }
    ];

    function createPiece() {
      const pieceData = shapes[Math.floor(Math.random() * shapes.length)];
      const piece = document.createElement("div");
      piece.className = "piece";

      const startX = Math.random() * (window.innerWidth - 120);
      const duration = 3 + Math.random() * 3;

      piece.style.left = `${startX}px`;
      piece.style.top = `-120px`;
      piece.style.animationDuration = `${duration}s`;

      pieceData.cells.forEach(([x, y]) => {
        const block = document.createElement("div");
        block.className = "block";
        block.style.left = `${x * 24}px`;
        block.style.top = `${y * 24}px`;
        block.style.background = pieceData.color;
        piece.appendChild(block);
      });

      scene.appendChild(piece);

      piece.addEventListener("animationend", () => {
        piece.remove();
      });
    }

    setInterval(createPiece, 700);
  </script>
</body>
</html>
