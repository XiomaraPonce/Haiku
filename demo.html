<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haiku Tetris</title>
  <style>
    :root {
      --cell: 24px;
      --cols: 24;
      --rows: 22;
      --w: calc(var(--cols) * var(--cell));
      --h: calc(var(--rows) * var(--cell));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #24345f 0%, #11192f 45%, #090d18 100%);
      font-family: Arial, sans-serif;
      color: white;
    }

    #wrap {
      width: var(--w);
    }

    #board {
      position: relative;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.15);
      background:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      background-size: var(--cell) var(--cell), var(--cell) var(--cell), auto;
      box-shadow:
        0 18px 50px rgba(0,0,0,0.35),
        inset 0 0 30px rgba(255,255,255,0.04);
    }

    .cell {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid rgba(0,0,0,0.22);
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.12);
      user-select: none;
    }

    #caption {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="board"></div>
  </div>

  <script>
    const COLS = 24;
    const ROWS = 22;
    const CELL = 24;
    const boardEl = document.getElementById("board");

    const COLORS = [
      "#27c9ff", "#ffd23f", "#c77dff", "#56e39f",
      "#ff6b6b", "#5da9ff", "#ff9f43"
    ];

    const haiku = [
      "Sometimes I wonder",
      "If I'm living correctly",
      "Surely others too"
    ];

    // Grid[row][col] = null or { ch, color, hidden }
    const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

    const targetRows = [19, 20, 21];
    const placements = [];

    // Invisible support blocks so the centered text can stack naturally.
    grid[21][0] = { hidden: true };
    grid[21][1] = { hidden: true };
    grid[21][22] = { hidden: true };
    grid[21][23] = { hidden: true };

    // Break each line into 4-letter tetromino payloads (all I-pieces).
    function buildPlacements() {
      let colorIndex = 0;

      for (let lineIndex = 0; lineIndex < haiku.length; lineIndex++) {
        const text = haiku[lineIndex];
        const row = targetRows[lineIndex];
        const startCol = Math.floor((COLS - text.length) / 2);

        for (let i = 0; i < text.length; i += 4) {
          const letters = text.slice(i, i + 4).split("");
          placements.push({
            targetRow: row,
            targetCol: startCol + i,
            letters,
            color: COLORS[colorIndex % COLORS.length]
          });
          colorIndex++;
        }
      }
    }

    buildPlacements();

    const I_SHAPES = {
      h: [[0,0],[1,0],[2,0],[3,0]],
      v: [[0,0],[0,1],[0,2],[0,3]]
    };

    let currentPiece = null;
    let placementIndex = 0;
    let tick = 0;
    let finished = false;

    function pieceCells(piece, x = piece.x, y = piece.y, rot = piece.rot) {
      const shape = I_SHAPES[rot];
      return shape.map(([dx, dy], i) => ({
        x: x + dx,
        y: y + dy,
        ch: piece.letters[i] || ""
      }));
    }

    function collides(piece, x = piece.x, y = piece.y, rot = piece.rot) {
      return pieceCells(piece, x, y, rot).some(cell => {
        if (cell.x < 0 || cell.x >= COLS || cell.y >= ROWS) return true;
        if (cell.y < 0) return false;
        return grid[cell.y][cell.x] !== null;
      });
    }

    function move(piece, dx, dy) {
      if (!collides(piece, piece.x + dx, piece.y + dy, piece.rot)) {
        piece.x += dx;
        piece.y += dy;
        return true;
      }
      return false;
    }

    function rotate(piece) {
      const nextRot = piece.rot === "v" ? "h" : "v";
      const kicks = [0, -1, 1, -2, 2];

      for (const kick of kicks) {
        const nx = piece.x + kick;
        if (!collides(piece, nx, piece.y, nextRot)) {
          piece.x = nx;
          piece.rot = nextRot;
          return true;
        }
      }
      return false;
    }

    function lockPiece(piece) {
      for (const cell of pieceCells(piece)) {
        if (cell.y >= 0) {
          grid[cell.y][cell.x] = {
            ch: cell.ch,
            color: piece.color,
            hidden: false
          };
        }
      }
      currentPiece = null;

      if (placementIndex >= placements.length) {
        finished = true;
      }
    }

    function spawnPiece() {
      if (placementIndex >= placements.length) return;

      const plan = placements[placementIndex++];
      currentPiece = {
        x: Math.floor(Math.random() * COLS),
        y: -4,
        rot: "v",
        letters: plan.letters,
        color: plan.color,
        targetCol: plan.targetCol,
        targetRow: plan.targetRow
      };

      while (collides(currentPiece) && currentPiece.x > 0) {
        currentPiece.x--;
      }
    }

    function aiStep(piece) {
      if (piece.rot === "v" && piece.y >= piece.targetRow - 4) {
        rotate(piece);
      } else if (piece.rot === "v" && tick % 8 === 0) {
        rotate(piece);
        if (piece.rot === "h") rotate(piece);
      }

      if (piece.rot === "h") {
        if (piece.x < piece.targetCol) move(piece, 1, 0);
        else if (piece.x > piece.targetCol) move(piece, -1, 0);
      } else {
        const targetX = piece.targetCol + 1;
        if (piece.x < targetX) move(piece, 1, 0);
        else if (piece.x > targetX) move(piece, -1, 0);
      }

      if (piece.y >= piece.targetRow - 2 && piece.rot !== "h") {
        rotate(piece);
      }

      if (!move(piece, 0, 1)) {
        lockPiece(piece);
      }
    }

    function draw() {
      boardEl.querySelectorAll(".live, .locked").forEach(el => el.remove());

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const cell = grid[y][x];
          if (!cell || cell.hidden) continue;

          const el = document.createElement("div");
          el.className = "cell locked";
          el.textContent = cell.ch;
          el.style.left = `${x * CELL}px`;
          el.style.top = `${y * CELL}px`;
          el.style.background = cell.color;
          boardEl.appendChild(el);
        }
      }

      if (currentPiece) {
        for (const cell of pieceCells(currentPiece)) {
          if (cell.y < 0) continue;
          const el = document.createElement("div");
          el.className = "cell live";
          el.textContent = cell.ch;
          el.style.left = `${cell.x * CELL}px`;
          el.style.top = `${cell.y * CELL}px`;
          el.style.background = currentPiece.color;
          boardEl.appendChild(el);
        }
      }
    }

    function loop() {
      tick++;

      if (!currentPiece && !finished) {
        spawnPiece();
      }

      if (currentPiece) {
        aiStep(currentPiece);
      }

      draw();
      requestAnimationFrame(() => setTimeout(loop, 90));
    }

    loop();
  </script>
</body>
</html>
